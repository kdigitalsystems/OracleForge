name: Cleanup old Actions artifacts

on:
  schedule:
    - cron: "17 4 */3 * *"
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: [self-hosted, terrascout-ci]
    timeout-minutes: 10
    steps:
      - name: Delete artifacts older than four days
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          # Avoid a `jq` dependency -- this workflow is pinned to a runner
          # pool where it isn't guaranteed to be installed (it wasn't; every
          # run failed with "jq: command not found" until this rewrite).
          # Every other JSON-handling step in this repo already uses Python
          # for the same reason, so do the same here instead of adding an
          # apt-get install step to a shared self-hosted machine.
          ids_file=$(mktemp)
          trap 'rm -f "$ids_file"' EXIT
          page=1

          # Collect IDs before deleting so pagination cannot skip artifacts as the list shrinks.
          while :; do
            response=$(gh api -H 'Accept: application/vnd.github+json' "/repos/$REPOSITORY/actions/artifacts?per_page=100&page=$page")
            count=$(python3 -c "import json,sys; print(len(json.loads(sys.stdin.read())['artifacts']))" <<< "$response")
            [ "$count" -eq 0 ] && break

            python3 -c "
          import json, sys
          from datetime import datetime, timedelta, timezone
          cutoff = datetime.now(timezone.utc) - timedelta(days=4)
          for a in json.loads(sys.stdin.read())['artifacts']:
              created = datetime.fromisoformat(a['created_at'].replace('Z', '+00:00'))
              if created < cutoff:
                  print(a['id'])
          " <<< "$response" >> "$ids_file"

            page=$((page + 1))
          done

          deleted=0
          while IFS= read -r id; do
            [ -z "$id" ] && continue
            gh api -X DELETE "/repos/$REPOSITORY/actions/artifacts/$id"
            deleted=$((deleted + 1))
          done < "$ids_file"

          echo "Deleted $deleted artifact(s) older than four days."
