name: OracleForge Evening Cleanup

on:
  schedule:
    # Weekdays 20:05 UTC = 4:05 PM ET (5 min after market close)
    - cron: '5 20 * * 1-5'

  workflow_dispatch:

jobs:
  close:
    # 'gpu' label = fully provisioned machine (also has ~/.ssh/alpaca_paper_keys);
    # keeps the job off unprovisioned runners like servert130.
    runs-on: [self-hosted, gpu]
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # No pip cache: redundant on a self-hosted runner and its cache-save
          # post-step is a flaky cleanup surface that can fail the job.

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Alpaca connection
        run: |
          python3 -c "
          import alpaca_client
          client = alpaca_client.get_trading_client()
          positions = alpaca_client.get_positions(client)
          print(f'OK: connected to Alpaca — {len(positions)} open position(s)')
          "

      - name: Settle fills and update journal
        run: python3 trader.py --close

      - name: Generate trade attribution
        run: python3 backtest.py --attribution

      - name: Regenerate GitHub Pages dashboard
        run: python3 scripts/generate_html_report.py

      - name: Commit settlement state
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add state/ history/ reports/ docs/

          if git diff --staged --quiet; then
            echo "No fills to record today."
          else
            git commit -m "Evening settlement $(date -u '+%Y-%m-%d')"
            # Rebase + retry: another scheduled workflow may have advanced main.
            for attempt in 1 2 3 4 5; do
              git rebase --abort 2>/dev/null || true
              if git pull --rebase --autostash origin main && git push origin HEAD:main; then
                echo "Pushed on attempt $attempt."
                exit 0
              fi
              echo "Push attempt $attempt failed; retrying in 5s..."
              sleep 5
            done
            echo "ERROR: could not push settlement state after 5 attempts."
            exit 1
          fi
