name: OracleForge Morning Orders

on:
  schedule:
    # Weekdays 13:30 UTC = 9:30 AM ET (market open)
    - cron: '30 13 * * 1-5'

  workflow_dispatch:

jobs:
  open:
    runs-on: self-hosted
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Alpaca connection
        run: |
          python3 -c "
          import alpaca_client
          client = alpaca_client.get_trading_client()
          positions = alpaca_client.get_positions(client)
          print(f'OK: connected to Alpaca — {len(positions)} open position(s)')
          "

      - name: Check today's signals exist
        run: |
          python3 -c "
          import json, os, sys
          from datetime import datetime
          today = datetime.now().strftime('%Y-%m-%d')
          path = f'reports/signals_{today}.json'
          if not os.path.exists(path):
              print(f'ERROR: {path} not found.')
              print('The nightly forge must run before the morning orders job.')
              sys.exit(1)
          report = json.load(open(path))
          active = report.get('summary', {}).get('active', 0)
          print(f'OK: {active} ACTIVE setups for {today}')
          "

      - name: Place limit buy orders
        run: python3 trader.py --open

      - name: Commit order state
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add state/open_orders.json

          if git diff --staged --quiet; then
            echo "No new orders placed."
          else
            git commit -m "Morning orders $(date -u '+%Y-%m-%d')"
            git push
          fi
