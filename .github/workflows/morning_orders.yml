name: OracleForge Morning Orders

on:
  schedule:
    # Weekdays 13:30 UTC = 9:30 AM ET (market open)
    - cron: '30 13 * * 1-5'

  workflow_dispatch:

jobs:
  open:
    runs-on: self-hosted
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # No pip cache: redundant on a self-hosted runner and its cache-save
          # post-step is a flaky cleanup surface that can fail the job.

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Alpaca connection
        run: |
          python3 -c "
          import alpaca_client
          client = alpaca_client.get_trading_client()
          positions = alpaca_client.get_positions(client)
          print(f'OK: connected to Alpaca — {len(positions)} open position(s)')
          "

      - name: Check today's signals exist
        run: |
          python3 -c "
          import json, os, sys
          from datetime import datetime, timedelta
          # Nightly runs at 23:00 UTC the previous calendar day; check that date first,
          # then today as a fallback (e.g. if nightly ran early or same-day re-run).
          candidates = [
              (datetime.now() - timedelta(days=1)).strftime('%Y-%m-%d'),
              datetime.now().strftime('%Y-%m-%d'),
          ]
          path = None
          for date in candidates:
              candidate = f'reports/signals_{date}.json'
              if os.path.exists(candidate):
                  path = candidate
                  break
          if not path:
              print(f'ERROR: No signals file found for {candidates[0]} or {candidates[1]}.')
              print('The nightly forge must run successfully before the morning orders job.')
              sys.exit(1)
          with open(path) as f:
              report = json.load(f)
          active = report.get('summary', {}).get('active', 0)
          print(f'OK: {active} ACTIVE setups ({path})')
          "

      - name: Place limit buy orders
        run: python3 trader.py --open

      - name: Commit order state
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add state/open_orders.json

          if git diff --staged --quiet; then
            echo "No new orders placed."
          else
            git commit -m "Morning orders $(date -u '+%Y-%m-%d')"
            # Rebase + retry: another scheduled workflow may have advanced main.
            for attempt in 1 2 3 4 5; do
              git rebase --abort 2>/dev/null || true
              if git pull --rebase --autostash origin main && git push origin HEAD:main; then
                echo "Pushed on attempt $attempt."
                exit 0
              fi
              echo "Push attempt $attempt failed; retrying in 5s..."
              sleep 5
            done
            echo "ERROR: could not push order state after 5 attempts."
            exit 1
          fi
