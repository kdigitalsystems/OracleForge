name: Regenerate GitHub Pages Report

on:
  workflow_dispatch:   # triggered by the Rebuild button on the dashboard

jobs:
  rebuild:
    # Pin to a provisioned machine for consistency with the other jobs.
    runs-on: [self-hosted, gpu]
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate HTML report
        # No pip install needed — generate_html_report.py uses stdlib only
        run: python3 scripts/generate_html_report.py

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/index.html

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Regenerate dashboard (manual rebuild)"
          git push
