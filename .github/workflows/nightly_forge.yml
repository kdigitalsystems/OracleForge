name: OracleForge Nightly Engine

on:
  schedule:
    # Weekdays 23:00 UTC — after US market close
    - cron: '0 23 * * 1-5'

  workflow_dispatch:

jobs:
  execute_loop:
    runs-on: self-hosted
    timeout-minutes: 720

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # No pip cache: on this self-hosted runner pip's own ~/.cache already
          # persists across runs, and the cache-save post-step is a flaky
          # cleanup surface that can hang/fail the whole job (seen after a
          # power blip killed the runner mid-cleanup).

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: python3 -m unittest test_signals test_backtest test_forge test_trader -v

      - name: Start Ollama
        run: |
          # What matters for the nightly run is that the Ollama HTTP API is
          # serving on :11434 — forge_loop.py only talks to that API, never the
          # binary directly. On this self-hosted runner Ollama runs as a
          # persistent systemd service (started at boot), so check the endpoint
          # FIRST. The runner's job process can run in a mount namespace where
          # /usr/local/bin/ollama is not visible as a file even though the
          # already-running server is reachable, so locating the binary is only
          # a fallback for when the server is genuinely down.
          check() { curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; }

          find_ollama() {
            command -v ollama 2>/dev/null && return 0
            for p in /usr/local/bin/ollama /usr/bin/ollama /bin/ollama \
                     "$HOME/.local/bin/ollama" /snap/bin/ollama /opt/ollama/bin/ollama; do
              if [ -x "$p" ]; then echo "$p"; return 0; fi
            done
            return 1
          }

          if check; then
            echo "Ollama already serving on :11434."
          else
            echo "Ollama not reachable yet; waiting and locating the binary (up to ~60s)..."
            OLLAMA=""
            for i in $(seq 1 12); do
              if check; then break; fi
              OLLAMA=$(find_ollama) && [ -n "$OLLAMA" ] && break
              echo "  waiting for ollama (attempt $i/12)..."
              sleep 5
            done

            if ! check; then
              if [ -z "$OLLAMA" ]; then
                echo "ERROR: Ollama is not serving and its binary was not found."
                echo "PATH=$PATH"
                exit 1
              fi
              echo "Starting Ollama from $OLLAMA ..."
              "$OLLAMA" serve > /tmp/ollama.log 2>&1 &
              for i in $(seq 1 30); do
                sleep 2
                if check; then echo "Ollama ready after $((i * 2))s"; break; fi
                if [ $i -eq 30 ]; then
                  echo "ERROR: Ollama did not start within 60s"
                  cat /tmp/ollama.log
                  exit 1
                fi
              done
            fi
          fi

          # Confirm models are available via the API (no binary required).
          echo "Installed models:"
          curl -s http://localhost:11434/api/tags

      - name: Build ticker universe from Alpaca
        run: python3 update_tickers.py

      - name: Verify ticker list
        run: |
          python3 -c "
          import json, sys
          tickers = json.load(open('config/tickers.json'))
          assert isinstance(tickers, list) and len(tickers) > 0, 'config/tickers.json is empty'
          print(f'OK: {len(tickers)} tickers ready')
          "

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Execute OracleForge AI Inference
        # Checkpoint to disk every 10 tickers (fine-grained resume) but push
        # upstream only every 100 tickers — i.e. process ~100 tickers, push,
        # process the next ~100, and so on. forge_loop is resumable (skips
        # finished tickers; the once-per-day score update is guarded), so on a
        # transient mid-run crash we re-invoke it and it continues from the last
        # checkpoint (losing at most 10 tickers of work, not a whole stage).
        run: |
          for attempt in 1 2 3; do
            echo "=== Forge attempt $attempt ==="
            if python3 forge_loop.py --batch-size 10 --push-every 100 --push; then
              echo "Forge completed on attempt $attempt."
              exit 0
            fi
            echo "Forge attempt $attempt failed; resuming in 30s..."
            sleep 30
          done
          echo "ERROR: forge did not complete after 3 attempts."
          exit 1

      - name: Validate outputs
        run: python3 scripts/validate_outputs.py

      - name: Generate GitHub Pages report
        run: python3 scripts/generate_html_report.py

      - name: Commit and Push Dashboard
        # forge_loop already committed + pushed config/state/history/reports
        # incrementally; this step only needs to publish the regenerated
        # dashboard. No changes here is fine (docs unchanged) — not an error.
        run: |
          git add docs/ config/ state/analyst_scores.json history/ reports/

          if git diff --staged --quiet; then
            echo "Nothing further to commit (forge pushed state incrementally)."
            exit 0
          fi

          git commit -m "Automated OracleForge nightly dashboard"

          # main may have advanced while this long job ran. Rebase and retry.
          for attempt in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          echo "ERROR: could not push dashboard after 5 attempts."
          exit 1
