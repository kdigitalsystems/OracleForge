name: OracleForge Nightly Engine

on:
  schedule:
    # Weekdays 23:00 UTC — after US market close
    - cron: '0 23 * * 1-5'

  workflow_dispatch:

jobs:
  execute_loop:
    runs-on: nvidia-gpu
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Latest S&P 500 Tickers
        run: python update_tickers.py --limit 50

      - name: Verify ticker list
        run: |
          python -c "
          import json, sys
          tickers = json.load(open('config/tickers.json'))
          assert isinstance(tickers, list) and len(tickers) > 0, 'config/tickers.json is empty'
          print(f'OK: {len(tickers)} tickers ready')
          "

      - name: Execute OracleForge AI Inference
        run: python forge_loop.py

      - name: Validate outputs
        run: python scripts/validate_outputs.py

      - name: Commit and Push State
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add config/ state/analyst_scores.json history/ reports/

          if git diff --quiet && git diff --staged --quiet; then
            echo "ERROR: No changes to commit after a successful forge run."
            exit 1
          fi

          git commit -m "Automated OracleForge nightly run"
          git push
