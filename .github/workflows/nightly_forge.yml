name: OracleForge Nightly Engine

on:
  schedule:
    # Sunday-Thursday 23:00 UTC — prepares the next US trading morning.
    # Sunday covers Monday open; Friday is intentionally skipped because the
    # Sunday run refreshes weekend news before Monday orders.
    - cron: '0 23 * * 0-4'

  workflow_dispatch:

jobs:
  execute_loop:
    # Require the 'gpu' label so the job only lands on a fully provisioned
    # machine (Ollama + models + ~/.ssh/alpaca_paper_keys). Unprovisioned
    # runners (e.g. servert130) lack the label and are skipped, so jobs queue
    # for a good machine instead of failing at Start Ollama / Verify Alpaca.
    runs-on: [self-hosted, gpu]
    timeout-minutes: 720

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # No pip cache: on this self-hosted runner pip's own ~/.cache already
          # persists across runs, and the cache-save post-step is a flaky
          # cleanup surface that can hang/fail the whole job (seen after a
          # power blip killed the runner mid-cleanup).

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: python3 -m unittest test_signals test_backtest test_forge test_trader test_alpaca_client -v

      - name: Start Ollama
        run: |
          # forge_loop.py only needs the Ollama HTTP API on :11434. Ollama runs
          # as a persistent systemd service here, but it can briefly stop
          # answering /api/tags (busy, post-reboot, transient blip) — which is
          # what failed a run while the service was actually up for 11h. So:
          # check the endpoint; if it's down, deterministically RESTART the
          # service (the runner has passwordless sudo), wait generously, and
          # only then fall back to launching the binary. Fail only if it never
          # comes up.
          check() { curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; }

          wait_up() {  # $1 = max seconds
            for _ in $(seq 1 "$(( $1 / 5 ))"); do
              check && return 0
              sleep 5
            done
            check
          }

          if check; then
            echo "Ollama already serving on :11434."
          else
            echo "Ollama not reachable; restarting the systemd service..."
            sudo -n systemctl restart ollama 2>/dev/null \
              || systemctl --user restart ollama 2>/dev/null \
              || true
            if wait_up 180; then
              echo "Ollama came up after service restart."
            else
              echo "Service restart did not help; trying to launch the binary directly..."
              OLLAMA=$(command -v ollama 2>/dev/null \
                || ls /usr/local/bin/ollama /usr/bin/ollama /bin/ollama \
                      "$HOME/.local/bin/ollama" /snap/bin/ollama 2>/dev/null | head -1)
              if [ -n "$OLLAMA" ]; then
                echo "Launching $OLLAMA serve ..."
                "$OLLAMA" serve > /tmp/ollama.log 2>&1 &
                wait_up 120 || true
              fi
            fi
          fi

          if ! check; then
            echo "ERROR: Ollama is not serving after restart + launch attempts."
            sudo -n systemctl status ollama --no-pager 2>/dev/null | tail -20 || true
            [ -f /tmp/ollama.log ] && tail -20 /tmp/ollama.log || true
            exit 1
          fi

          # Confirm models are available via the API (no binary required).
          echo "Installed models:"
          curl -s http://localhost:11434/api/tags

      - name: Build ticker universe from Alpaca
        run: python3 update_tickers.py

      - name: Verify ticker list
        run: |
          python3 -c "
          import json, sys
          tickers = json.load(open('config/tickers.json'))
          assert isinstance(tickers, list) and len(tickers) > 0, 'config/tickers.json is empty'
          print(f'OK: {len(tickers)} tickers ready')
          "

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Execute OracleForge AI Inference
        # Checkpoint to disk every 10 tickers (fine-grained resume) but push
        # upstream only every 100 tickers — i.e. process ~100 tickers, push,
        # process the next ~100, and so on. forge_loop is resumable (skips
        # finished tickers; the once-per-day score update is guarded), so on a
        # transient mid-run crash we re-invoke it and it continues from the last
        # checkpoint (losing at most 10 tickers of work, not a whole stage).
        run: |
          for attempt in 1 2 3; do
            echo "=== Forge attempt $attempt ==="
            if python3 forge_loop.py --batch-size 10 --push-every 100 --push; then
              echo "Forge completed on attempt $attempt."
              exit 0
            fi
            echo "Forge attempt $attempt failed; resuming in 30s..."
            sleep 30
          done
          echo "ERROR: forge did not complete after 3 attempts."
          exit 1

      - name: Validate outputs
        run: python3 scripts/validate_outputs.py

      - name: Refresh recent walk-forward study
        run: |
          # Evidence-only optimization report. yfinance can occasionally be
          # slow/noisy, so keep this bounded and non-blocking for the trading run.
          timeout 240 python3 backtest.py --walk-forward --max-dates 5 --train-window 3 --test-window 1 \
            || echo "Walk-forward refresh skipped or timed out; keeping prior report."

      - name: Generate GitHub Pages report
        run: python3 scripts/generate_html_report.py

      - name: Commit and Push Dashboard
        # forge_loop already committed + pushed config/state/history/reports
        # incrementally; this step only needs to publish the regenerated
        # dashboard. No changes here is fine (docs unchanged) — not an error.
        run: |
          git add docs/ config/ state/analyst_scores.json history/ reports/

          if git diff --staged --quiet; then
            echo "Nothing further to commit (forge pushed state incrementally)."
            exit 0
          fi

          git commit -m "Automated OracleForge nightly dashboard"

          # main may have advanced while this long job ran. Rebase and retry.
          for attempt in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          echo "ERROR: could not push dashboard after 5 attempts."
          exit 1
