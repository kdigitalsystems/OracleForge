name: OracleForge Nightly Engine

on:
  schedule:
    # Weekdays 23:00 UTC — after US market close
    - cron: '0 23 * * 1-5'

  workflow_dispatch:

jobs:
  execute_loop:
    runs-on: self-hosted
    timeout-minutes: 720

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: python3 -m unittest test_signals test_backtest test_forge -v

      - name: Start Ollama
        run: |
          OLLAMA=$(which ollama 2>/dev/null \
            || ls /usr/local/bin/ollama /usr/bin/ollama "$HOME/.local/bin/ollama" 2>/dev/null | head -1)
          if [ -z "$OLLAMA" ]; then
            echo "ERROR: ollama binary not found. Install from https://ollama.com"
            exit 1
          fi
          echo "Found ollama at: $OLLAMA"
          if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
            echo "Ollama already running."
          else
            $OLLAMA serve &
            sleep 8
          fi
          $OLLAMA list

      - name: Build ticker universe from Alpaca
        run: python3 update_tickers.py

      - name: Verify ticker list
        run: |
          python3 -c "
          import json, sys
          tickers = json.load(open('config/tickers.json'))
          assert isinstance(tickers, list) and len(tickers) > 0, 'config/tickers.json is empty'
          print(f'OK: {len(tickers)} tickers ready')
          "

      - name: Execute OracleForge AI Inference
        run: python3 forge_loop.py

      - name: Validate outputs
        run: python3 scripts/validate_outputs.py

      - name: Generate GitHub Pages report
        run: python3 scripts/generate_html_report.py

      - name: Commit and Push State
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add config/ state/analyst_scores.json history/ reports/ docs/

          if git diff --quiet && git diff --staged --quiet; then
            echo "ERROR: No changes to commit after a successful forge run."
            exit 1
          fi

          git commit -m "Automated OracleForge nightly run"
          git push
